<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Ảnh Hoạt Động</title>
    <style>
        /* Đảm bảo toàn bộ trang chiếm hết chiều cao màn hình */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column; /* Chuyển bố cục sang dạng cột */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC, #85FFBD, #21D4FD);
            background-size: 400% 400%;
            animation: gradientBG 18s ease infinite;
            color: #fff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Phần nội dung chính sẽ giãn ra để đẩy footer xuống dưới */
        .main-content {
            flex: 1 0 auto;
            padding: 20px;
        }

        h1.gallery-title {
            text-align: center;
            font-size: 3rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-frame {
            background: rgba(255, 255, 255, 0.85);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.4s ease-in-out;
            cursor: pointer;
            overflow: hidden;
        }

        .photo-frame:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            background: rgba(255, 255, 255, 1);
        }

        .photo-frame img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 250px; /* Khớp chiều cao với ảnh */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            background: #000;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-btn {
            display: block;
            width: max-content;
            margin: 40px auto;
            padding: 10px 30px;
            background: rgba(0,0,0,0.5);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            border: 2px solid white;
            transition: 0.3s;
        }

        .back-btn:hover {
             background: white;
             color: #FF6A88;
        }

        /* Footer cố định ở dưới cùng */
        footer {
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            padding: 40px 0 20px 0;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center; /* Cân giữa chân trang */
            text-align: center;
            padding: 0 30px;
        }

        .footer-col h3 {
            font-size: 1.4rem;
            color: #ffeb3b;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .footer-col p {
            font-size: 1rem;
            color: #e0e0e0;
            line-height: 1.6;
            margin: 5px 0;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px;
            font-size: 0.9rem;
            color: #bbb;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1 class="gallery-title">Khoảnh Khắc Hoạt Động CLB</h1>

        <div class="gallery-container">
            <div class="photo-frame">
                <img src="gen-h-z6431836157570_6ba3937566658cbf51e94e26b1d93633.jpg" alt="Hoạt động 1">
            </div>

            <div class="photo-frame">
                <img src="gen-h-z7538592809964_046821cd4f9a3e5ede796fd0f90cf738.jpg" alt="Hoạt động 2">
            </div>

            <div class="video-container">
                <iframe src="vd6.mp4" title="Múa văn nghệ" allowfullscreen></iframe>
            </div>

            <div class="video-container">
                <iframe src="vd3.mp4" title="Múa văn nghệ" allowfullscreen></iframe>
            </div>
        </div>

        <a href="index.html" class="back-btn">← Quay lại Trang Chủ</a>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-col">
                <h3>Liên Hệ</h3>
                <p>📍 Địa chỉ: Lớp 12A6 2025-2026</p>
                <p>📧 Email: ht810393@gmail.com</p>
                <p>📞 Hotline: 0345685650</p>
            </div>
        </div>
        
        <div class="footer-bottom">
            <p>&copy; 2026 CLB THPT Krông Bông. Thiết kế bởi MR.Huy</p>
        </div>
    </footer>

</body>
</html>
